[project]
name = "penalty-proven-daemon"
authors = ["Daemon Labs"]
description = "A sophisticated smart contract system for decentralized penalty tracking and validation"
telemetry = false
requirements = []
[contracts.penalty-tracking]
path = "contracts/penalty-tracking.clar"
depends_on = []

[contracts.penalty-calculation]
path = "contracts/penalty-calculation.clar"
depends_on = []

[contracts.penalty-token]
path = "contracts/penalty-token.clar"
depends_on = []

[contracts.penalty-resolution]
path = "contracts/penalty-resolution.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
